<!DOCTYPE html>
<html>
<head>
  <title>Page Title</title>
</head>
<body>

  <div>
    <canvas id="myChart"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1"></script>

  <script>
    const ctx = document.getElementById('myChart');

    const tempData = [
       { x: '2026-04-20T00:00:00', y: 12 },
       { x: '2026-04-20T01:00:00', y: 9 },
       { x: '2026-04-20T02:00:00', y: 13 },
       { x: '2026-04-20T03:00:00', y: 14 },
       { x: '2026-04-20T04:00:00', y: 15 },
       { x: '2026-04-20T05:00:00', y: 18 },
       { x: '2026-04-20T06:00:00', y: 17 },
       { x: '2026-04-20T07:00:00', y: 19 },
       { x: '2026-04-20T08:00:00', y: 23 },
       { x: '2026-04-20T09:00:00', y: 21 },
       { x: '2026-04-20T10:00:00', y: 25 },
       { x: '2026-04-20T11:00:00', y: 22 },
       { x: '2026-04-20T12:00:00', y: 20 },
       { x: '2026-04-20T13:00:00', y: 24 },
       { x: '2026-04-20T14:00:00', y: 21 },
       { x: '2026-04-20T15:00:00', y: 16 },
       { x: '2026-04-20T16:00:00', y: 17 },
       { x: '2026-04-20T17:00:00', y: 14 },
       { x: '2026-04-20T18:00:00', y: 13 },
       { x: '2026-04-20T19:00:00', y: 12 },
       { x: '2026-04-20T20:00:00', y: 10 },
       { x: '2026-04-20T21:00:00', y: 11 },
       { x: '2026-04-20T22:00:00', y: 9 },
       { x: '2026-04-20T23:00:00', y: 8 }
    ];

    const myData = {
      type: 'line',
      data: {
        datasets: [
          {
            label: 'Temperatura (°C)',
            data: tempData,
            borderColor: 'rgba(255,99,132,1)',
            backgroundColor: 'rgba(255,99,132,0.2)',
            borderWidth: 3,
            tension: 0.4,
            // rendono i punti invisibili ma ancora "hoverabili"
            pointRadius: 0,
            pointHoverRadius: 6,
            hitRadius: 8,
            fill: true
          }
        ]
      },
      options: {
        responsive: true,
        interaction: {
          mode: 'nearest',
          intersect: false
        },
        plugins: {
          title: {
            display: true,
            text: 'Titolo del grafico',
            padding: { top: 12, bottom: 6 },
            font: { family: 'Arial, sans-serif', size: 18, weight: '600' }
          },
          legend: { position: 'top' },
          tooltip: {
            callbacks: {
              title: function(items) {
                if (!items.length) return '';
                const ms = items[0].parsed.x;
                return luxon.DateTime.fromMillis(ms).toFormat('HH:mm dd/LL/yyyy');
              },
              label: function(item) {
                const y = item.parsed.y;
                return `${item.dataset.label}: ${y}°`;
              }
            }
          }
        },
        scales: {
          x: {
            type: 'time',
            position: 'top',
            time: {
              unit: 'hour',
              displayFormats: { hour: 'HH:mm' }
            },
            title: { display: true, text: 'Tempo' },
            ticks: {
              callback: function(value) {
                const ms = Number(value);
                const hour = luxon.DateTime.fromMillis(ms).toFormat('HH:mm');
                const found = tempData.find(d => luxon.DateTime.fromISO(d.x).toMillis() === ms);
                const temp = found ? found.y + '°' : '';
                return [hour, temp];
              },
              padding: 6
            },
            grid: {
              display: false  // nasconde le linee verticali
            }
          },
          y: {
            beginAtZero: false,
            title: { display: true, text: 'Temperatura (°C)' },
            ticks: {
              callback: function(value) { return value + '°'; }
            },
            grid: {
              display: false  // nasconde le linee orizzontali
            }
          }
        }
      }
    };

    new Chart(ctx, myData);
  </script>

</body>
</html>
